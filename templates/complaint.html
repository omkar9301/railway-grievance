<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Grievance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Global IRCTC Theme -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='styles/dashboard_theme.css') }}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold text-danger" href="#">
            🚆 Railway Grievance Portal
        </a>

        <ul class="navbar-nav ml-auto align-items-center">
            <li class="nav-item mr-3">
                Welcome, <strong>{{ current_user.username }}</strong>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('logout') }}"
                   class="btn btn-outline-danger btn-sm">
                    Logout
                </a>
            </li>
        </ul>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<div class="dashboard-container mt-5 pt-5">

    <!-- HEADER CARD -->
    <div class="dashboard-card mb-4">
        <h4>Register a Grievance</h4>
        <p class="text-muted">
            Please fill in the details carefully to submit your complaint
        </p>

        <a href="{{ url_for('user_dashboard') }}"
           class="btn btn-outline-secondary btn-sm">
            ← Back to Dashboard
        </a>
    </div>

    <!-- ================= FORM CARD ================= -->
    <div class="dashboard-card">

        <form method="POST" enctype="multipart/form-data">

            <!-- Department -->
            <div class="form-group">
                <label>Department</label>
                <select class="form-control" name="department" required>
                    <option value="" disabled selected>Select Department</option>
                    <option>Ticket Booking</option>
                    <option>Passenger Services</option>
                    <option>Lost and Found</option>
                    <option>Complaints</option>
                    <option>Safety and Security</option>
                    <option>Train Operations</option>
                    <option>Cleaning and Maintenance</option>
                    <option>Food Services</option>
                    <option>Reservation</option>
                    <option>Customer Support</option>
                </select>
            </div>

            <!-- PNR -->
            <div class="form-group">
                <label>PNR Number</label>
                <input type="text"
                       class="form-control"
                       name="pnr_no"
                       required>
            </div>

            <!-- Age -->
            <div class="form-group">
                <label>Age</label>
                <input type="number"
                       class="form-control"
                       name="age"
                       required>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label>Additional Information</label>
                <textarea class="form-control"
                          name="additional_info"
                          rows="4"></textarea>
            </div>

            <!-- Images -->
            <div class="form-group">
                <label>Upload Images (optional)</label>
                <input type="file"
                       class="form-control"
                       name="images"
                       multiple>
            </div>

            <!-- Buttons -->
            <div class="mt-4">
                <button type="submit"
                        class="btn btn-danger">
                    Submit Complaint
                </button>

                <a href="{{ url_for('track_complaints') }}"
                   class="btn btn-outline-primary ml-2">
                    Track Complaints
                </a>
            </div>

        </form>

    </div>

</div>

<!-- ================= FOOTER ================= -->
<footer class="text-center mt-5 p-3 bg-light">
    © 2026 Railway Grievance Portal
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
